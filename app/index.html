    <!-- UTM Capture Script -->
    <script>
      (function() {
        // Capture UTM parameters from URL and store in localStorage
        function captureUTMs() {
          const urlParams = new URLSearchParams(window.location.search);
          const utmData = {};
          
          ['utm_source', 'utm_medium', 'utm_campaign', 'utm_term', 'utm_content'].forEach(param => {
            const value = urlParams.get(param);
            if (value) {
              utmData[param] = value;
              localStorage.setItem(param, value);
            }
          });
          
          // Also store timestamp of first visit
          if (!localStorage.getItem('first_visit_timestamp')) {
            localStorage.setItem('first_visit_timestamp', new Date().toISOString());
          }
          
          // Store landing page URL
          if (!localStorage.getItem('landing_page')) {
            localStorage.setItem('landing_page', window.location.href);
          }
          
          // Push UTM data to dataLayer if any UTMs were found
          if (Object.keys(utmData).length > 0) {
            window.dataLayer.push({
              event: 'utm_captured',
              utm_data: utmData
            });
          }
        }
        
        // Execute immediately
        captureUTMs();
      })();
    </script>
    
    <!-- Scroll Depth Tracking -->
    <script>
      (function() {
        let scrollDepthTriggered = {};
        
        function trackScrollDepth() {
          const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
          const docHeight = document.documentElement.scrollHeight - document.documentElement.clientHeight;
          const scrollPercent = Math.round((scrollTop / docHeight) * 100);
          
          [25, 50, 75, 90].forEach(threshold => {
            if (scrollPercent >= threshold && !scrollDepthTriggered[threshold]) {
              scrollDepthTriggered[threshold] = true;
              window.dataLayer.push({
                event: 'scroll_depth',
                depth_percent: threshold
              });
            }
          });
        }
        
        window.addEventListener('scroll', trackScrollDepth, { passive: true });
      })();
    </script>
